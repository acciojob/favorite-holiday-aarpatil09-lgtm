<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite Holiday</title>
</head>
<body>

    <!-- Heading -->
    <h1>Paris</h1>
    <br>

    <!-- Paragraph -->
    <p>Paris is known as the <strong>City of Light</strong> and is famous for its art, culture, and beautiful landmarks.</p>

    <!-- Ordered List: Top 5 Attractions -->
    <ol>
        <li><strong>Eiffel Tower</strong></li>
        <li><em>Louvre Museum</em></li>
        <li><strong>Notre-Dame Cathedral</strong></li>
        <li><em>Sacré-Cœur</em></li>
        <li><strong>Champs-Élysées</strong></li>
    </ol>

    <!-- Unordered List: Must-Try Foods -->
    <ul>
        <li><strong>Croissants</strong></li>
        <li><em>Escargot</em></li>
        <li><strong>Macarons</strong></li>
        <li><em>Baguette</em></li>
        <li><strong>Ratatouille</strong></li>
    </ul>

</body>
</html>
